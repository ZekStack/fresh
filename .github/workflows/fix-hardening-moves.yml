name: Fix hardening move semantics

on:
  push:
    branches:
      - agent/v0.1.0-release-hardening
    paths:
      - '.github/workflows/fix-hardening-moves.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make sync batches explicitly move-only
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/FreshStorage.cpp')
          text = path.read_text()

          old = '''struct FreshJournalSyncRecord {\n\tuint64_t sequence = 0;\n\tFreshJournalOp op = FreshJournalOp::Create;\n\tFreshBuffer payload;\n};'''
          new = '''struct FreshJournalSyncRecord {\n\tFreshJournalSyncRecord() = default;\n\tFreshJournalSyncRecord(const FreshJournalSyncRecord &) = delete;\n\tFreshJournalSyncRecord &operator=(const FreshJournalSyncRecord &) = delete;\n\tFreshJournalSyncRecord(FreshJournalSyncRecord &&) noexcept = default;\n\tFreshJournalSyncRecord &operator=(FreshJournalSyncRecord &&) noexcept = default;\n\n\tuint64_t sequence = 0;\n\tFreshJournalOp op = FreshJournalOp::Create;\n\tFreshBuffer payload;\n};'''
          if old not in text:
              raise SystemExit('journal sync record declaration not found')
          text = text.replace(old, new, 1)

          old = '''struct FreshModelSyncBatch {\n\tstd::shared_ptr<void> state;'''
          new = '''struct FreshModelSyncBatch {\n\tFreshModelSyncBatch() = default;\n\tFreshModelSyncBatch(const FreshModelSyncBatch &) = delete;\n\tFreshModelSyncBatch &operator=(const FreshModelSyncBatch &) = delete;\n\tFreshModelSyncBatch(FreshModelSyncBatch &&) noexcept = default;\n\tFreshModelSyncBatch &operator=(FreshModelSyncBatch &&) noexcept = default;\n\n\tstd::shared_ptr<void> state;'''
          if old not in text:
              raise SystemExit('model sync batch declaration not found')
          text = text.replace(old, new, 1)

          path.write_text(text)
          PY

          rm -f ci-diagnostic.txt
          rm -f .github/workflows/fix-hardening-moves.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Make sync batches explicitly move-only'
          git push
