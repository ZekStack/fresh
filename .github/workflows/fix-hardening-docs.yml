name: Fix hardening documentation

on:
  push:
    branches:
      - agent/v0.1.0-release-hardening
    paths:
      - '.github/workflows/fix-hardening-docs.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update release documentation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text()
          text = text.replace(
              '* The destructor uses a bounded final `deinit({.sync = true, .timeoutMS = 2000})`, but automatic destructor cleanup is best-effort only. If shutdown times out, the destructor cannot report the failure. Production code that needs deterministic shutdown or guaranteed final persistence should call `FreshResult result = db.deinit();` manually and check the result before the object is destroyed.',
              '* A bounded explicit `deinit()` may return `FreshStatus::Timeout`; the object remains in a stopping state and a later `deinit()` can finish waiting. The destructor uses an unbounded task-exit barrier because owned state cannot be destroyed while the sync task may still access it. Production code should still call `FreshResult result = db.deinit();` manually when it needs to observe final-sync failures.'
          )
          text = text.replace(
              '* Fresh `0.1.0` uses manifest/snapshot payload v2 and journal v2 with replay checkpoints. It intentionally does not load `0.0.x` database files; erase the development database when upgrading.',
              '* Fresh `0.1.0` uses manifest/snapshot payload v3 and journal v3. Manifest entries map logical names to immutable storage IDs, so rename never moves model directories. The release intentionally rejects earlier pre-release storage formats; erase the development database when upgrading.'
          )
          text = text.replace(
              '| `SelfTest` | Destructive Fresh development self-test for persistence, recovery, backup, and shutdown behavior. It uses `/fresh_selftest`, `/fresh_selftest_src`, and `/fresh_selftest_dst`, touches internal storage files, and should only be run on a test device or test partition. |',
              '| `SelfTest` | Destructive Fresh development self-test for persistence, recovery, backup, and shutdown behavior. It uses `/fresh_selftest`, `/fresh_selftest_src`, and `/fresh_selftest_dst`, touches internal storage files, and should only be run on a test device or test partition. |\n| `ReleaseHardeningTest` | Focused v0.1.0 validation for immutable storage IDs, rename persistence, configuration ceilings, synchronized metadata access, and repeatable shutdown. |'
          )
          text = text.replace(
              '`SelfTest` is compiled by CI through the examples build loop, but it is not executed in CI. Run it manually on ESP32 hardware.',
              '`SelfTest` and `ReleaseHardeningTest` are compiled by CI through the examples build loop, but they are not executed in CI. Run both manually on ESP32 hardware.'
          )
          text = text.replace(
              '| [`docs/troubleshooting.md`](docs/troubleshooting.md) | Common issues and solutions. |',
              '| [`docs/troubleshooting.md`](docs/troubleshooting.md) | Common issues and solutions. |\n| [`docs/release-hardening.md`](docs/release-hardening.md) | v0.1.0 persistence, synchronization, shutdown, allocation, and validation invariants. |'
          )
          readme.write_text(text)

          api = Path('docs/api.md')
          text = api.read_text()
          old = '`sync` defaults to `true`. When `sync` is `false`, Fresh stops without a final checkpoint, so dirty RAM state that has not already synced may be lost. The destructor calls `deinit({.sync = true, .timeoutMS = 2000})` because destructors should not block indefinitely, but automatic destructor cleanup is best-effort only. If shutdown times out, the destructor cannot report the failure. Applications that need deterministic shutdown or guaranteed final persistence should call `FreshResult result = db.deinit();` manually and check the result before the object is destroyed.'
          new = '`sync` defaults to `true`. When `sync` is `false`, Fresh stops without a final checkpoint, so dirty RAM state that has not already synced may be lost. A bounded explicit `deinit()` may return `FreshStatus::Timeout`; the instance remains alive in its stopping state and a later call can finish waiting. The destructor uses an unbounded task-exit barrier and never releases worker-owned state while the sync task may still access the object. Applications that need to observe final-sync failures should call `FreshResult result = db.deinit();` manually and check the result before destruction.'
          if old not in text:
              raise SystemExit('API shutdown paragraph not found')
          api.write_text(text.replace(old, new, 1))

          config = Path('docs/configuration.md')
          text = config.read_text()
          old = 'The defaults are strict embedded defaults. Raise them only when the LittleFS partition and RAM budget can support larger payloads.'
          new = '''The defaults are strict embedded defaults. Raise them only when the LittleFS partition and RAM budget can support larger payloads. Fresh rejects invalid configurations during `init()` before loading database state.\n\nManifest, snapshot, and journal payloads have an absolute 1 MiB ceiling. `maxDocumentBytes`, `maxJournalRecordBytes`, and `maxSnapshotBytes` must be nonzero and no greater than this ceiling; the journal limit must exceed the document limit, and the snapshot limit must be at least the document limit. `backupBufferSize` must be between 1 byte and 1 MiB.'''
          if old not in text:
              raise SystemExit('configuration limit paragraph not found')
          config.write_text(text.replace(old, new, 1))
          PY

          rm -f .github/workflows/fix-hardening-docs.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Update v0.1.0 hardening documentation'
          git push
