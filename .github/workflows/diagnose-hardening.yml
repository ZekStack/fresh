name: Diagnose hardening compile

on:
  push:
    branches:
      - agent/v0.1.0-release-hardening
    paths:
      - '.github/workflows/diagnose-hardening.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install PIOArduino
        run: |
          python -m pip install --upgrade pioarduino==6.1.19
          pio pkg install -g -p 'https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip'

      - name: Compile and capture diagnostics
        shell: bash
        run: |
          set +e
          pio ci examples/Basic \
            --board esp32dev \
            --lib='.' \
            --project-option 'platform=https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip' \
            --project-option 'build_unflags=-std=gnu++11' \
            --project-option 'build_flags=-std=gnu++20' 2>&1 | tee /tmp/fresh-build.log
          status=${PIPESTATUS[0]}
          tail -n 300 /tmp/fresh-build.log > ci-diagnostic.txt
          printf '\nexit_status=%s\n' "$status" >> ci-diagnostic.txt

          rm -f .github/workflows/diagnose-hardening.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record hardening compile diagnostics'
          git push
