name: Apply query result integrity fix

on:
  push:
    branches:
      - fix/query-result-integrity

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/query-result-integrity
          fetch-depth: 0

      - name: Apply source changes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          model_path = Path('src/FreshModel.cpp')
          model = model_path.read_text()
          model = model.replace(
              '#include "internal/FreshInternal.h"\n',
              '#include "internal/FreshInternal.h"\n#include "internal/FreshMemory.h"\n',
              1,
          )

          old_find = '''\tFreshResult result = FreshResult::success("documents found");
\tJsonArray array = result.doc.to<JsonArray>();
\tfor (const auto &entry : _state->docs) {
\t\tif (!predicate(entry.second)) {
\t\t\tcontinue;
\t\t}
\t\tarray.add(entry.second.as<JsonVariantConst>());
\t\tresult.affectedCount++;
\t\tif (stopAtFirst) {
\t\t\tbreak;
\t\t}
\t}
\tif (result.affectedCount == 0) {
\t\tresult.message = "no documents found";
\t}
\treturn result;
'''
          new_find = '''\tJsonDocument resultDoc(&FreshJsonAllocator());
\tJsonArray array = resultDoc.to<JsonArray>();
\tsize_t affectedCount = 0;
\tfor (const auto &entry : _state->docs) {
\t\tif (!predicate(entry.second)) {
\t\t\tcontinue;
\t\t}
\t\tif (!array.add(entry.second.as<JsonVariantConst>()) || resultDoc.overflowed()) {
\t\t\treturn FreshResult::failure(
\t\t\t    FreshStatus::OutOfMemory,
\t\t\t    "failed to construct find result"
\t\t\t);
\t\t}
\t\taffectedCount++;
\t\tif (stopAtFirst) {
\t\t\tbreak;
\t\t}
\t}
\tresultDoc.shrinkToFit();
\tFreshResult result = FreshResult::success(
\t    affectedCount == 0 ? "no documents found" : "documents found",
\t    affectedCount
\t);
\tresult.doc = std::move(resultDoc);
\treturn result;
'''
          assert old_find in model, 'find block changed upstream'
          model = model.replace(old_find, new_find, 1)

          old_update_result = '''\t\tif (!candidates.empty() && returnMode == FreshReturn::ChangedDocs) {
\t\t\tJsonArray array = result.doc.to<JsonArray>();
\t\t\tfor (const FreshUpdateCandidate &candidate : candidates) {
\t\t\t\tarray.add(candidate.doc.as<JsonVariantConst>());
\t\t\t}
\t\t} else if (!candidates.empty() && returnMode == FreshReturn::AllDocs) {
\t\t\tJsonArray array = result.doc.to<JsonArray>();
\t\t\tfor (const auto &entry : _state->docs) {
\t\t\t\tconst JsonDocument  *document = &entry.second;
\t\t\t\tfor (const FreshUpdateCandidate &candidate : candidates) {
\t\t\t\t\tif (candidate.id == entry.first) {
\t\t\t\t\t\tdocument = &candidate.doc;
\t\t\t\t\t\tbreak;
\t\t\t\t\t}
\t\t\t\t}
\t\t\t\tarray.add(document->as<JsonVariantConst>());
\t\t\t}
\t\t}

\t\t_owner->_nextPendingSequence = nextSequence;
'''
          new_update_result = '''\t\tJsonDocument resultDoc(&FreshJsonAllocator());
\t\tif (!candidates.empty() && returnMode == FreshReturn::ChangedDocs) {
\t\t\tJsonArray array = resultDoc.to<JsonArray>();
\t\t\tfor (const FreshUpdateCandidate &candidate : candidates) {
\t\t\t\tif (!array.add(candidate.doc.as<JsonVariantConst>()) || resultDoc.overflowed()) {
\t\t\t\t\treturn FreshResult::failure(
\t\t\t\t\t    FreshStatus::OutOfMemory,
\t\t\t\t\t    "failed to construct changed documents result"
\t\t\t\t\t);
\t\t\t\t}
\t\t\t}
\t\t} else if (!candidates.empty() && returnMode == FreshReturn::AllDocs) {
\t\t\tJsonArray array = resultDoc.to<JsonArray>();
\t\t\tfor (const auto &entry : _state->docs) {
\t\t\t\tconst JsonDocument *document = &entry.second;
\t\t\t\tfor (const FreshUpdateCandidate &candidate : candidates) {
\t\t\t\t\tif (candidate.id == entry.first) {
\t\t\t\t\t\tdocument = &candidate.doc;
\t\t\t\t\t\tbreak;
\t\t\t\t\t}
\t\t\t\t}
\t\t\t\tif (!array.add(document->as<JsonVariantConst>()) || resultDoc.overflowed()) {
\t\t\t\t\treturn FreshResult::failure(
\t\t\t\t\t    FreshStatus::OutOfMemory,
\t\t\t\t\t    "failed to construct all documents result"
\t\t\t\t\t);
\t\t\t\t}
\t\t\t}
\t\t}
\t\tif (!candidates.empty() && returnMode != FreshReturn::None) {
\t\t\tresultDoc.shrinkToFit();
\t\t\tresult.doc = std::move(resultDoc);
\t\t}

\t\t_owner->_nextPendingSequence = nextSequence;
'''
          assert old_update_result in model, 'update result block changed upstream'
          model = model.replace(old_update_result, new_update_result, 1)

          old_retrieve = '''\tFreshResult result = FreshResult::success("stream entries found");
\tJsonArray array = result.doc.to<JsonArray>();
\tsize_t skipped = 0;
\tconst size_t total = _state->streamEntries.size();
\tfor (size_t i = 0; i < total; ++i) {
\t\tconst size_t index = options.reverse ? total - 1 - i : i;
\t\tconst JsonDocument &entry = _state->streamEntries[index];
\t\tif (predicate && !predicate(entry)) {
\t\t\tcontinue;
\t\t}
\t\tif (skipped < options.offset) {
\t\t\tskipped++;
\t\t\tcontinue;
\t\t}
\t\tarray.add(entry.as<JsonVariantConst>());
\t\tresult.affectedCount++;
\t\tif (options.limit > 0 && result.affectedCount >= options.limit) {
\t\t\tbreak;
\t\t}
\t}
\tif (result.affectedCount == 0) {
\t\tresult.message = "no stream entries found";
\t}
\treturn result;
'''
          new_retrieve = '''\tJsonDocument resultDoc(&FreshJsonAllocator());
\tJsonArray array = resultDoc.to<JsonArray>();
\tsize_t skipped = 0;
\tsize_t affectedCount = 0;
\tconst size_t total = _state->streamEntries.size();
\tfor (size_t i = 0; i < total; ++i) {
\t\tconst size_t index = options.reverse ? total - 1 - i : i;
\t\tconst JsonDocument &entry = _state->streamEntries[index];
\t\tif (predicate && !predicate(entry)) {
\t\t\tcontinue;
\t\t}
\t\tif (skipped < options.offset) {
\t\t\tskipped++;
\t\t\tcontinue;
\t\t}
\t\tif (!array.add(entry.as<JsonVariantConst>()) || resultDoc.overflowed()) {
\t\t\treturn FreshResult::failure(
\t\t\t    FreshStatus::OutOfMemory,
\t\t\t    "failed to construct stream result"
\t\t\t);
\t\t}
\t\taffectedCount++;
\t\tif (options.limit > 0 && affectedCount >= options.limit) {
\t\t\tbreak;
\t\t}
\t}
\tresultDoc.shrinkToFit();
\tFreshResult result = FreshResult::success(
\t    affectedCount == 0 ? "no stream entries found" : "stream entries found",
\t    affectedCount
\t);
\tresult.doc = std::move(resultDoc);
\treturn result;
'''
          assert old_retrieve in model, 'retrieve block changed upstream'
          model = model.replace(old_retrieve, new_retrieve, 1)
          model_path.write_text(model)

          inspection_path = Path('src/FreshInspection.cpp')
          inspection = inspection_path.read_text()
          inspection = inspection.replace(
              '#include "internal/FreshInternal.h"\n',
              '#include "internal/FreshInternal.h"\n#include "internal/FreshMemory.h"\n',
              1,
          )
          old_list = '''\tFreshResult result = FreshResult::success("records listed");
\tJsonArray records = result.doc.to<JsonArray>();
\tsize_t skipped = 0;

\tauto appendRecord = [&](const JsonDocument &record) {
\t\tif (skipped < options.offset) {
\t\t\tskipped++;
\t\t\treturn true;
\t\t}
\t\trecords.add(record.as<JsonVariantConst>());
\t\tresult.affectedCount++;
\t\treturn options.limit == 0 || result.affectedCount < options.limit;
\t};

\tif (_state->type == FreshModelType::Stream) {
\t\tif (options.reverse) {
\t\t\tfor (auto it = _state->streamEntries.rbegin(); it != _state->streamEntries.rend(); ++it) {
\t\t\t\tif (!appendRecord(*it)) break;
\t\t\t}
\t\t} else {
\t\t\tfor (const JsonDocument &record : _state->streamEntries) {
\t\t\t\tif (!appendRecord(record)) break;
\t\t\t}
\t\t}
\t} else if (options.reverse) {
\t\tfor (auto it = _state->docs.rbegin(); it != _state->docs.rend(); ++it) {
\t\t\tif (!appendRecord(it->second)) break;
\t\t}
\t} else {
\t\tfor (const auto &entry : _state->docs) {
\t\t\tif (!appendRecord(entry.second)) break;
\t\t}
\t}

\tif (result.affectedCount == 0) {
\t\tresult.message = "no records found";
\t}
\treturn result;
'''
          new_list = '''\tJsonDocument resultDoc(&FreshJsonAllocator());
\tJsonArray records = resultDoc.to<JsonArray>();
\tsize_t skipped = 0;
\tsize_t affectedCount = 0;
\tbool allocationFailed = false;

\tauto appendRecord = [&](const JsonDocument &record) {
\t\tif (skipped < options.offset) {
\t\t\tskipped++;
\t\t\treturn true;
\t\t}
\t\tif (!records.add(record.as<JsonVariantConst>()) || resultDoc.overflowed()) {
\t\t\tallocationFailed = true;
\t\t\treturn false;
\t\t}
\t\taffectedCount++;
\t\treturn options.limit == 0 || affectedCount < options.limit;
\t};

\tif (_state->type == FreshModelType::Stream) {
\t\tif (options.reverse) {
\t\t\tfor (auto it = _state->streamEntries.rbegin(); it != _state->streamEntries.rend(); ++it) {
\t\t\t\tif (!appendRecord(*it)) break;
\t\t\t}
\t\t} else {
\t\t\tfor (const JsonDocument &record : _state->streamEntries) {
\t\t\t\tif (!appendRecord(record)) break;
\t\t\t}
\t\t}
\t} else if (options.reverse) {
\t\tfor (auto it = _state->docs.rbegin(); it != _state->docs.rend(); ++it) {
\t\t\tif (!appendRecord(it->second)) break;
\t\t}
\t} else {
\t\tfor (const auto &entry : _state->docs) {
\t\t\tif (!appendRecord(entry.second)) break;
\t\t}
\t}

\tif (allocationFailed) {
\t\treturn FreshResult::failure(
\t\t    FreshStatus::OutOfMemory,
\t\t    "failed to construct record list"
\t\t);
\t}
\tresultDoc.shrinkToFit();
\tFreshResult result = FreshResult::success(
\t    affectedCount == 0 ? "no records found" : "records listed",
\t    affectedCount
\t);
\tresult.doc = std::move(resultDoc);
\treturn result;
'''
          assert old_list in inspection, 'listRecords block changed upstream'
          inspection = inspection.replace(old_list, new_list, 1)
          inspection_path.write_text(inspection)

          test_path = Path('examples/ResultIntegrityTest/ResultIntegrityTest.ino')
          test_path.parent.mkdir(parents=True, exist_ok=True)
          test_path.write_text(r'''#include <Arduino.h>
#include <Fresh.h>
#include <LittleFS.h>

namespace {

constexpr const char *TestPath = "/fresh_result_integrity";
constexpr size_t RecordCount = 48;

bool checkResultArray(const FreshResult &result, size_t expected, const char *label) {
  if (!result) {
    Serial.printf("FAIL %s: %s\n", label, result.message.c_str());
    return false;
  }
  JsonArrayConst records = result.doc.as<JsonArrayConst>();
  if (records.isNull() || result.doc.overflowed() ||
      result.affectedCount != expected || records.size() != expected) {
    Serial.printf(
        "FAIL %s: affected=%u array=%u overflow=%d\n",
        label,
        static_cast<unsigned>(result.affectedCount),
        static_cast<unsigned>(records.size()),
        result.doc.overflowed()
    );
    return false;
  }
  return true;
}

bool runTest() {
  LittleFS.remove("/fresh_result_integrity/manifest.a.msgpack");
  LittleFS.remove("/fresh_result_integrity/manifest.b.msgpack");

  Fresh db;
  FreshConfig config;
  config.syncIntervalMS = 60000;
  if (!db.init(TestPath, config)) return false;

  FreshModelResult generalResult = db.createModel("Records", FreshModelType::General);
  FreshModelResult streamResult = db.createModel("Stream", FreshModelType::Stream);
  if (!generalResult || !streamResult) return false;

  String payload;
  payload.reserve(256);
  while (payload.length() < 255) payload += 'x';

  for (size_t index = 0; index < RecordCount; ++index) {
    JsonDocument record;
    record["index"] = index;
    record["payload"] = payload;
    if (!generalResult.model.create(record)) return false;

    JsonDocument entry;
    entry["index"] = index;
    entry["payload"] = payload;
    if (!streamResult.model.append(entry)) return false;
  }

  FreshResult found = generalResult.model.find([](const JsonDocument &) { return true; });
  if (!checkResultArray(found, RecordCount, "find")) return false;

  JsonDocument patch;
  patch["updated"] = true;
  FreshResult changed = generalResult.model.update(
      [](const JsonDocument &) { return true; },
      patch,
      FreshReturn::ChangedDocs
  );
  if (!checkResultArray(changed, RecordCount, "update changed")) return false;

  FreshResult all = generalResult.model.update(
      [](const JsonDocument &) { return false; },
      patch,
      FreshReturn::AllDocs
  );
  if (!checkResultArray(all, 0, "update no matches")) return false;

  FreshRecordRetrieveOptions page;
  page.offset = 7;
  page.limit = 13;
  page.reverse = true;
  if (!checkResultArray(generalResult.model.listRecords(page), 13, "listRecords")) return false;
  if (!checkResultArray(streamResult.model.retrieve(page), 13, "retrieve")) return false;

  db.deinit({.sync = false});
  return true;
}

}  // namespace

void setup() {
  Serial.begin(115200);
  delay(500);
  if (!LittleFS.begin(true)) {
    Serial.println("FAIL LittleFS");
    return;
  }
  Serial.println(runTest() ? "PASS result integrity" : "FAIL result integrity");
}

void loop() {
  delay(1000);
}
''')
          PY

          rm .github/workflows/apply-query-result-fix.yml

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix query result integrity"
          git push origin HEAD:fix/query-result-integrity
