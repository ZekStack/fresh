name: Assemble hardening sources

on:
  push:
    branches:
      - agent/v0.1.0-release-hardening
    paths:
      - '.github/workflows/assemble-hardening.yml'

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble source and test files
        shell: bash
        run: |
          set -euo pipefail

          cat .agent_chunks/model/part00 \
              .agent_chunks/model/part01 \
              .agent_chunks/model/part02 \
              .agent_chunks/model/part03a \
              .agent_chunks/model/part03b \
              .agent_chunks/model/part03c > src/FreshModel.cpp

          cat .agent_chunks/storage/part00 \
              .agent_chunks/storage/part01 > src/FreshStorage.cpp
          for part in part02 part03 part04 part05a part05b; do
            base64 --decode ".agent_chunks/storage/${part}.b64" >> src/FreshStorage.cpp
          done

          mkdir -p examples/ReleaseHardeningTest
          : > examples/ReleaseHardeningTest/ReleaseHardeningTest.ino
          for part in part00a part00b part00c part00d part01a part01b; do
            base64 --decode ".agent_chunks/test/${part}.b64" >> examples/ReleaseHardeningTest/ReleaseHardeningTest.ino
          done

          rm -rf .agent_chunks
          rm -f src/internal/FreshPsramAllocator.h
          rm -f .github/workflows/assemble-hardening.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Implement v0.1.0 release hardening'
          git push
