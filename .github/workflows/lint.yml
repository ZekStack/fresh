name: Lint

on:
  pull_request:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  metadata_lint:
    name: Metadata Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version consistency
        run: python3 scripts/check_version_consistency.py

      - name: Verify library metadata
        run: grep -qx 'name=Fresh' library.properties

      - name: Arduino Lint
        uses: arduino/arduino-lint-action@v1
        with:
          library-manager: false
          project-type: library
