name: Fix hardening lock ordering

on:
  push:
    branches:
      - agent/v0.1.0-release-hardening
    paths:
      - '.github/workflows/fix-hardening-lock.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move time callback outside database lock
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/FreshModel.cpp')
          text = path.read_text()

          old = '''\tFreshEvent event;\n\tFreshResult result;\n\t{\n\t\tFreshLock lock(*_owner->_mutex);'''
          new = '''\tconst uint64_t time = _owner->now();\n\tFreshEvent event;\n\tFreshResult result;\n\t{\n\t\tFreshLock lock(*_owner->_mutex);'''
          if text.count(old) < 2:
              raise SystemExit('expected create/append event pattern not found')
          text = text.replace(old, new, 1)
          text = text.replace('''\n\t\tconst uint64_t time = _owner->now();\n\t\tdoc["createdAt"] = time;''', '''\n\t\tdoc["createdAt"] = time;''', 1)

          old = '''\tstd::vector<FreshEvent> events;\n\tFreshResult result = FreshResult::success("documents updated");'''
          new = '''\tconst uint64_t updateTime = _owner->now();\n\tstd::vector<FreshEvent> events;\n\tFreshResult result = FreshResult::success("documents updated");'''
          if old not in text:
              raise SystemExit('update timestamp insertion point not found')
          text = text.replace(old, new, 1)
          text = text.replace('candidate["updatedAt"] = _owner->now();', 'candidate["updatedAt"] = updateTime;', 1)

          path.write_text(text)
          PY

          rm -f .github/workflows/fix-hardening-lock.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Avoid re-locking database for timestamps'
          git push
