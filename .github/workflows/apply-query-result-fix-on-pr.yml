name: Apply query result fix on pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/query-result-integrity
          fetch-depth: 0

      - name: Run patch script
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import subprocess

          workflow = Path('.github/workflows/apply-query-result-fix.yml').read_text()
          marker = '      - name: Apply source changes\n'
          start = workflow.index('        run: |\n', workflow.index(marker)) + len('        run: |\n')
          end = workflow.index('\n      - name: Commit fix', start)
          lines = workflow[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/apply-query-result-fix.sh').write_text(script)
          subprocess.run(['bash', '/tmp/apply-query-result-fix.sh'], check=True)
          PY
          rm .github/workflows/apply-query-result-fix-on-pr.yml

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix query result integrity"
          git push origin HEAD:fix/query-result-integrity
